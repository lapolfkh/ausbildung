<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polizei Falkenheim - Ausbildungsportal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase Live-Speicher Treiber -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="portalBody">

    <div class="container">
        <header>
            <h1>Landespolizei Falkenheim</h1>
            <h2>Ausbildungs- & Prüfungsportal</h2>
        </header>

        <!-- HAUPTMENÜ -->
        <div id="mainMenu" class="portal-selection">
            <button onclick="openPortal('azubi')" class="btn-portal azubi">1. Auszubildende/r</button>
            <button onclick="showLogin('ausbilder')" class="btn-portal ausbilder">2. Ausbilder/in</button>
            <button onclick="showLogin('kommission')" class="btn-portal kommission">3. Prüfungskommission</button>
        </div>

        <!-- LOGIN BEREICH -->
        <div id="loginSection" class="login-box" style="display: none;">
            <h2 id="loginTitle">Login</h2>
            <form onsubmit="event.preventDefault(); doLogin();">
                <input type="text" id="username" placeholder="Benutzername">
                <input type="password" id="password" placeholder="Passwort">
                <button type="submit" class="btn-login-submit">Einloggen</button>
            </form>
            <button onclick="goBack()" class="btn-back">Zurück</button>
        </div>

        <!-- PORTAL: AZUBI -->
        <div id="portal-azubi" class="portal-content" style="display: none;">
            <header><h2>Azubi Portal</h2><button onclick="goBack()" class="btn-back">Beenden</button></header>
            <h3>Geplante Ausbildungen</h3>
            <div id="azubiSchedules" class="schedule-list"></div>
        </div>

        <!-- PORTAL: AUSBILDER -->
        <div id="portal-ausbilder" class="portal-content" style="display: none;">
            <header><h2>Ausbilder Portal</h2><button onclick="goBack()" class="btn-back">Ausloggen</button></header>
            <div class="schedule-section">
                <h3>+ Neuen Termin anlegen</h3>
                <input type="date" id="schedDate_ausbilder">
                <input type="time" id="schedTime_ausbilder" value="18:00">
                <select id="schedProgram_ausbilder">
                    <option value="Modul 1">Modul 1</option>
                    <option value="Modul 2">Modul 2</option>
                </select>
                <button onclick="addSchedule('ausbilder')">Termin eintragen</button>
            </div>
            <h3>Eigene Termine</h3>
            <div id="ausbilderSchedulesContainer"></div>
        </div>

        <!-- PORTAL: KOMMISSION -->
        <div id="portal-kommission" class="portal-content" style="display: none;">
            <header><h2>Kommission Portal</h2><button onclick="goBack()" class="btn-back">Ausloggen</button></header>
            
            <div class="schedule-section">
                <h3>+ Termin anlegen</h3>
                <input type="date" id="schedDate_kommission">
                <input type="time" id="schedTime_kommission" value="18:00">
                <select id="schedProgram_kommission">
                    <option value="Modul 1 Prüfung">Modul 1 Prüfung</option>
                </select>
                <button onclick="addSchedule('kommission')">Termin eintragen</button>
            </div>

            <div class="exam-control-section">
                <h3>Prüfungs-Freischaltung</h3>
                <input type="checkbox" id="checkExam1"> Prüfung Modul 1
                <button onclick="unlockSelectedExams()" class="btn-exam-unlock">Jetzt freischalten</button>
            </div>

            <!-- NEU: INTEGRATION GOOGLE SHEET -->
            <div class="google-sheet-section" style="margin-top: 30px; padding: 20px; background: #2f3640; border-radius: 8px;">
                <h3>📊 Ausbildungsliste (Google Sheets)</h3>
                <iframe src="https://docs.google.com/spreadsheets/d/1ZDcMMcbiKdppFG18m9vrwSAZMGXjGY1xHLz8qSSWVzc/edit?usp=sharing" width="100%" height="400px" style="border: none; border-radius: 4px;"></iframe>
            </div>

            <h3>Terminverwaltung</h3>
            <div id="kommissionSchedulesContainer"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
