<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landespolizei Falkenheim - Ausbildungsmodule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Landespolizei Falkenheim</h1>
            <h2>Ausbildungsmodule</h2>
            <a href="admin.html" class="btn-admin">Admin-Bereich</a>
        </header>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Nach Modulnamen suchen...">
            <button id="examBtn" class="btn-exam">Prüfung</button>
        </section>

        <main id="modulesContainer" class="modules-grid">
            </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Initialisiert die Ansicht für normale User
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof supabase !== 'undefined') {
                renderModules();
            } else {
                console.error("Supabase konnte nicht geladen werden.");
            }
            
            // Suchfunktion
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderModules(e.target.value);
            });

            // Prüfung Button Event
            document.getElementById('examBtn').addEventListener('click', () => {
                alert('Derzeit in Bearbeitung');
            });
        });
    </script>
</body>
</html>
